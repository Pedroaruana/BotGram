<div class="templates-page">

  <div class="page-header">
    <div class="header-inner">
      <a routerLink="/" class="back-link">← voltar</a>
      <div class="header-text">
        <div class="section-label">// templates</div>
        <h1>Escolha seu template</h1>
        <p>3 templates grátis pra começar. Nos planos pagos você desbloqueia todos.</p>
      </div>

      <div class="filters">
        @for (f of filters; track f.value) {
          <button
            class="filter-btn"
            [class.active]="activeFilter() === f.value"
            (click)="setFilter(f.value)"
          >
            {{ f.label }}
            @if (f.value === 'gratis') {
              <span class="filter-count">3</span>
            }
            @if (f.value === 'pro') {
              <span class="filter-count">6</span>
            }
          </button>
        }
      </div>
    </div>
  </div>

  <div class="grid-wrapper">
    <div class="templates-grid">
      @for (template of templates(); track template.id) {
        <app-template-card
          [template]="template"
          (onSelect)="onTemplateSelect($event)"
        />
      }
    </div>
  </div>

</div>
